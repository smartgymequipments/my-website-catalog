<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Product Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="data.js"></script>
    <script src="admin.js" defer></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #1e293b;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100%;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid #334155;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.25rem;
            color: #e6c200;
        }

        .nav-links {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
        }

        .nav-links li a {
            display: block;
            padding: 1rem 1.5rem;
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-links li a:hover,
        .nav-links li a.active {
            background: #334155;
            color: white;
            border-left: 3px solid #e6c200;
        }

        .logout-section {
            padding: 1rem;
            border-top: 1px solid #334155;
        }

        .logout-btn {
            width: 100%;
            padding: 0.75rem;
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* Main Content */
        .main-content {
            margin-left: 250px;
            padding: 2rem;
            flex: 1;
            width: calc(100% - 250px);
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-primary {
            background: #e6c200;
            color: black;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-success {
            background: #22c55e;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Views */
        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        /* Product List */
        .product-table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 8px;
            overflow: hidden;
        }

        .product-table th,
        .product-table td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid #334155;
        }

        .product-table th {
            background: #0f172a;
            color: #94a3b8;
        }

        .product-thumbnail {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
        }

        /* Forms */
        .form-container {
            background: #1e293b;
            padding: 2rem;
            border-radius: 8px;
            max-width: 800px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 4px;
            color: white;
        }

        .form-row {
            display: flex;
            gap: 1rem;
        }

        .half-width {
            flex: 1;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>Admin Portal</h2>
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active" onclick="switchView('list-view')">All Products</a></li>
            <li><a href="#" onclick="switchView('add-view')">Add New Product</a></li>
            <li><a href="#" onclick="switchView('category-view')">Category Manager</a></li>
        </ul>
        <div class="logout-section">
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">

        <!-- List View -->
        <div id="list-view" class="view-section active">
            <div class="header-bar">
                <h1>All Products</h1>
                <div class="header-actions">
                    <button class="btn-success" onclick="publishChanges()">1. Generate Data</button>
                    <button class="btn-primary" style="background:#3b82f6; color:white;" onclick="deployToGitHub()">2.
                        Push to Cloud</button>
                </div>
            </div>

            <div class="search-bar" style="margin-bottom: 1rem;">
                <input type="text" id="product-search" placeholder="Search products..."
                    style="width: 100%; padding: 0.75rem; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 6px;">
            </div>

            <table class="product-table">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="product-table-body">
                    <!-- JS Injected -->
                </tbody>
            </table>
        </div>

        <!-- Add/Edit View -->
        <div id="add-view" class="view-section">
            <div class="header-bar">
                <h1 id="form-title">Add New Product</h1>
                <button class="btn-primary" style="background: #334155; color:white;"
                    onclick="switchView('list-view')">Cancel</button>
            </div>

            <div class="form-container">
                <form id="product-form">
                    <input type="hidden" id="edit-key">

                    <div class="form-row">
                        <div class="form-group half-width">
                            <label>Product Name</label>
                            <input type="text" id="p-name" required>
                        </div>
                        <div class="form-group half-width">
                            <label>Category</label>
                            <select id="p-category" required onchange="loadSubcatsForProductForm()">
                                <option value="">Loading...</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Sub Category</label>
                        <select id="p-subcategory" required>
                            <option value="">Select Category First</option>
                        </select>
                        <small style="color: #64748b;">(Or create new via Category Manager)</small>
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="p-description" rows="4"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Product Image</label>
                        <input type="file" id="p-image" accept="image/*">
                        <p id="current-image-path" style="font-size: 0.8rem; color: #e6c200; margin-top: 5px;"></p>
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%;">Save Product</button>
                </form>
            </div>
        </div>

        <!-- Category Manager View -->
        <div id="category-view" class="view-section">
            <div class="header-bar">
                <h1>Manage Categories</h1>
            </div>

            <!-- Structure Manager -->
            <div style="display: flex; gap: 2rem; height: calc(100vh - 200px);">

                <!-- Left: Categories -->
                <div style="flex: 1; background: #1e293b; padding: 1rem; border-radius: 8px; overflow-y: auto;">
                    <h3>Categories</h3>
                    <div class="form-row" style="margin-bottom: 1rem;">
                        <input type="text" id="new-cat-name" placeholder="New Category Name" style="width: 100%;">
                        <button class="btn-primary" onclick="addCategory()">Add</button>
                    </div>
                    <ul id="cat-manager-list" class="nav-links" style="border: 1px solid #334155; border-radius: 4px;">
                        <!-- dynamic -->
                    </ul>
                </div>

                <!-- Right: Subcategories -->
                <div style="flex: 1; background: #1e293b; padding: 1rem; border-radius: 8px; overflow-y: auto;">
                    <h3 id="sub-manager-title">Subcategories</h3>
                    <div id="sub-manager-content" style="display:none;">
                        <input type="hidden" id="selected-cat-for-sub">
                        <div class="form-row" style="margin-bottom: 1rem;">
                            <input type="text" id="new-sub-name" placeholder="New Subcategory Name"
                                style="width: 100%;">
                            <button class="btn-primary" onclick="addSubCategory()">Add</button>
                        </div>
                        <ul id="sub-manager-list" class="nav-links"
                            style="border: 1px solid #334155; border-radius: 4px;">
                            <!-- dynamic -->
                        </ul>
                    </div>
                    <p id="sub-manager-placeholder" style="color: #64748b; margin-top: 2rem; text-align: center;">Select
                        a Category to manage its subcategories.</p>
                </div>

            </div>
        </div>

    </main>

</body>

</html>
